apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  labels:
    {{- include "panoramax.labels" . | nindent 4 }}
    app: auth
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: keycloak
          image: {{ .Values.auth.image }}
          args: ["start-dev", "--import-realm"]
          env:
            # Used by realm.json template substitution
            - name: GEOVISIO_BASE_URL
              value: {{ .Values.apiExternalUrl }}
            - name: GEOVISIO_CLIENT_SECRET
              value: {{ .Values.auth.clientSecret }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.auth.adminUser }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.auth.adminPassword }}
            # In compose this pointed to the API proxy; replicate that behaviour
            # or set authExternalUrl directly if Keycloak is accessed directly.
            - name: KEYCLOAK_FRONTEND_URL
              value: {{ .Values.apiExternalUrl }}/api/auth/login
            - name: KC_HTTP_PORT
              value: "8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /realms/geovisio
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 5
            failureThreshold: 24
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
