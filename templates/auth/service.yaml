apiVersion: v1
kind: Service
metadata:
  name: auth
  labels:
    {{- include "panoramax.labels" . | nindent 4 }}
spec:
  selector:
    app: auth
  # LoadBalancer so the browser can reach Keycloak for the OAuth dance.
  # vind assigns a local IP automatically.
  type: LoadBalancer
  ports:
    - port: 8182
      targetPort: 8080
