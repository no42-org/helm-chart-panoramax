apiVersion: batch/v1
kind: Job
metadata:
  # Revision suffix ensures each install/upgrade creates a fresh Job rather
  # than conflicting with a completed one from a previous run.
  name: migrations-{{ .Release.Revision }}
  labels:
    {{- include "panoramax.labels" . | nindent 4 }}
spec:
  backoffLimit: 5
  template:
    spec:
      restartPolicy: Never
      initContainers:
        {{- include "panoramax.waitForDb" . | nindent 8 }}
      containers:
        - name: migrations
          image: {{ include "panoramax.apiImage" . }}
          args: ["db-upgrade"]
          env:
            - name: DB_URL
              value: {{ include "panoramax.dbUrl" . }}
